<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Reservation</title>
</head>
<body>
    <h2>Add Reservation</h2>

    <form action="insert_reservations.php" method="POST">
        <label>Guest ID:</label><br>
        <input type="text" name="guest_id" required><br><br>

        <label>Room ID:</label><br>
        <input type="text" name="room_id" required><br><br>

        <label>Check-in Date:</label><br>
        <input type="date" name="check_in_date" required><br><br>

        <label>Check-out Date:</label><br>
        <input type="date" name="check_out_date" required><br><br>

        <label>Number of Guests:</label><br>
        <input type="number" name="number_of_guests" required><br><br>

        <label>Total Price:</label><br>
        <input type="text" name="total_price" required><br><br>

        <label>Booking Status:</label><br>
        <input type="text" name="booking_status" required><br><br>

        <button type="submit">Save</button>
    </form>
</body>
</html>
